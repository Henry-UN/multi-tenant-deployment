apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: shared-services
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: shared-services
  template:
    metadata:
      name: 'voting-app-shared-services'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/Henry-UN/voting-app-kubernetes.git'
        targetRevision: HEAD
        path: .
        helm:
          valueFiles:
            - values/shared-services.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: shared-services
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
