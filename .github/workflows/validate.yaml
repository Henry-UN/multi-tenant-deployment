name: Validate Manifests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Validate YAML syntax
        run: |
          pip install yamllint
          echo "Validating plain YAML files..."
          for dir in values tenants argocd; do
            [ -d "$dir" ] && find "$dir" -type f \( -name "*.yaml" -o -name "*.yml" \) | while read f; do
              yamllint -d relaxed "$f" && echo "  OK $f"
            done
          done
          for f in Chart.yaml; do
            [ -f "$f" ] && yamllint -d relaxed "$f" && echo "  OK $f"
          done

      - name: Helm template – shared-services
        run: |
          helm template voting-app . -f values/shared-services.yaml --namespace shared-services > /dev/null
          echo "shared-services render OK"

      - name: Helm template – tenant-standard
        run: |
          helm template voting-app . -f values/tenant-standard.yaml \
            --set namespace=tenant-test \
            --set tenantName=test \
            > /dev/null
          echo "tenant-standard render OK"

      - name: Helm template – tenant-regulated
        run: |
          helm template voting-app . -f values/tenant-regulated.yaml \
            --set namespace=tenant-test \
            --set tenantName=test \
            > /dev/null
          echo "tenant-regulated render OK"

      - name: Helm template – output check (optional)
        run: |
          helm template voting-app . -f values/tenant-standard.yaml \
            --set namespace=tenant-test \
            --set tenantName=test \
            | grep -q "kind: Service"
          helm template voting-app . -f values/shared-services.yaml | grep -q "kind: Service"
          echo "Generated manifests contain expected resources"
