{{- if .Values.deploy.vote }}
apiVersion: v1
kind: Service
metadata:
  name: vote-service
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    app: voting-app
    component: vote
    tenant: {{ .Values.tenantName | default "shared" }}
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: voting-app
    component: vote
{{- end }}
