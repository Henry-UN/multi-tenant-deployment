{{- if .Values.deploy.postgres }}
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    app: voting-app
    component: postgres
    tenant: {{ .Values.tenantName | default "shared" }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: voting-app
    component: postgres
{{- end }}
