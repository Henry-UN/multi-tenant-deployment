# Standard tier: uses shared Redis and Postgres in shared-services namespace
tier: standard
redisMode: shared
postgresMode: shared

# Hosts point to shared-services (overridden per-tenant by ArgoCD)
redisHost: redis.shared-services.svc.cluster.local
postgresHost: db.shared-services.svc.cluster.local

deploy:
  vote: true
  result: true
  worker: true
  redis: false
  postgres: false
  networkPolicy: true

vote:
  replicas: 1
  image: kodekloud/examplevotingapp_vote:v1

result:
  replicas: 1
  image: kodekloud/examplevotingapp_result:v1

worker:
  replicas: 1
  image: kodekloud/examplevotingapp_worker:v1

postgresUser: postgres
postgresPassword: postgres
